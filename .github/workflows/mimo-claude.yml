name: MiMo Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]

jobs:
  claude:
    if: |
      github.actor == 'Yong-yuan-X' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code with MiMo
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude"
          # Required by the action validator; gateway auth is set with ANTHROPIC_AUTH_TOKEN below.
          anthropic_api_key: ${{ secrets.MIMO_API_KEY }}
          settings: |
            {
              "env": {
                "ANTHROPIC_BASE_URL": "https://token-plan-sgp.xiaomimimo.com/anthropic",
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.MIMO_API_KEY }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "mimo-v2.5-pro",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "mimo-v2.5-pro",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "mimo-v2.5-pro"
              }
            }
          claude_args: |
            --model mimo-v2.5-pro
            --max-turns 15

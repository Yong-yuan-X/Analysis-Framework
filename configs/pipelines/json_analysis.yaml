{
  "name": "json_analysis",
  "input": {
    "type": "json",
    "path": "data/raw/example.json"
  },
  "steps": [
    {
      "name": "missing_values",
      "enabled": true,
      "params": {
        "strategy": "mean"
      }
    },
    {
      "name": "descriptive_stats",
      "enabled": true
    },
    {
      "name": "categorical_frequency",
      "enabled": true,
      "params": {
        "columns": [
          "city"
        ],
        "top_n": 3
      }
    },
    {
      "name": "correlation",
      "enabled": true
    }
  ],
  "output": {
    "save_processed": true,
    "save_report": true,
    "dir": "data/processed"
  }
}
